<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" href="/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>hex-sight-game-2 — avatar test</title>
		<style>
			html, body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #202428;
				font-family: system-ui, sans-serif;
				color: #e8e8ec;
			}

			#app {
				position: absolute;
				inset: 0;
			}

			#app canvas {
				display: block;
				width: 100%;
				height: 100%;
			}

			#ui {
				position: absolute;
				top: 12px;
				left: 12px;
				z-index: 10;
				display: flex;
				flex-direction: column;
				gap: 8px;
				background: rgba(20, 22, 26, 0.7);
				padding: 10px 12px;
				border-radius: 8px;
				backdrop-filter: blur(6px);
				font-size: 13px;
				user-select: none;
			}

			#ui .row {
				display: flex;
				gap: 6px;
			}

			#ui button {
				background: #2a2f36;
				color: #e8e8ec;
				border: 1px solid #3a3f47;
				border-radius: 6px;
				padding: 6px 10px;
				font-size: 12px;
				cursor: pointer;
			}

			#ui button:hover {
				background: #353b44;
			}

			#ui button.active {
				background: #4a6fa5;
				border-color: #6a8fc5;
			}

			#status {
				font-size: 11px;
				color: #9aa0a8;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<div id="ui">
			<div class="row">
				<button id="btn-glb">GLB</button>
				<button id="btn-vrm">VRM</button>
				<button id="btn-both">Both</button>
			</div>
			<div id="status">Initializing…</div>
		</div>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
